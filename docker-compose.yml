version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: movetoheal_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: movetoheal_backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/movetoheal
      - JWT_SECRET=supersecretjwtkey_movetoheal_2026
    depends_on:
      - mongodb

  ai_model:
    build: 
      context: ./ai_model
      dockerfile: Dockerfile
    container_name: movetoheal_ai
    ports:
      - "5000:5000"

volumes:
  mongodb_data:
